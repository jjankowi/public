<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lista testów</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #f4f5f7; }
  .test-row {
    background: #fff;
    border-radius: .5rem;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .test-title { font-size: 1.25rem; font-weight: 600; margin: 0; }
  .test-desc  { color: #6c757d; font-size: .9rem; margin: 0; }
  .test-status { font-size: .85rem; color: #495057; white-space: nowrap; }
  .progress { height: 8px; min-width: 140px; }
  .test-msg { font-weight: 600; white-space: nowrap; min-width: 130px; text-align: right; }
  .test-msg.ok    { color: #198754; }
  .test-msg.error { color: #dc3545; }
</style>
</head>
<body>

<div class="container py-4">
  <h4 class="mb-4">Testy</h4>
  <div id="testList"></div>
</div>

<script>
/* =====================================================
   TUTAJ DODAJESZ TESTY — jedna linijka na test.
   passed: true  -> zielony pasek + "Dane poprawne"
   passed: false -> czerwony pasek + "Error"
   ===================================================== */
const tests = [
  { name: "Test logowania",     desc: "Sprawdza poprawność logowania użytkownika", status: "zakończony", passed: false },
  { name: "Test bazy danych",   desc: "Weryfikacja połączenia z bazą",             status: "zakończony", passed: true  },
  { name: "Test API",           desc: "Sprawdza odpowiedzi endpointów",            status: "w trakcie",  passed: true  },
];

/* Funkcja do dodawania testu z kodu (np. wynik z Pythona): */
function addTest(name, desc, status, passed) {
  tests.push({ name, desc, status, passed });
  render();
}

function render() {
  const list = document.getElementById("testList");
  list.innerHTML = tests.map(t => `
    <div class="test-row d-flex align-items-center gap-4 flex-wrap">
      <div style="min-width:180px">
        <p class="test-title">${t.name}</p>
      </div>
      <div class="flex-grow-1" style="min-width:200px">
        <p class="test-desc">${t.desc}</p>
      </div>
      <div class="test-status">${t.status}</div>
      <div class="progress flex-grow-1" style="max-width:260px">
        <div class="progress-bar ${t.passed ? "bg-success" : "bg-danger"}"
             style="width:100%"></div>
      </div>
      <div class="test-msg ${t.passed ? "ok" : "error"}">
        ${t.passed ? "Dane poprawne" : "Error"}
      </div>
    </div>
  `).join("");
}

render();

/* Przykład: dodanie testu później, np. po otrzymaniu wyniku:
   addTest("Nowy test", "Opis testu", "zakończony", true);
*/
</script>

</body>
</html>
